spring:
  application:
    name: "server-gateway"
  cloud:
    nacos:
      config:
        group: DEFAULT_GROUP
        file-extension: yaml
        server-addr: 192.168.117.129:8848
        username: nacos
        password: VrYNf4sne0
      discovery:
        namespace: public
        username: nacos
        password: VrYNf4sne0
        server-addr: 192.168.117.129:8848
        heart-beat-interval: 1000
        heart-beat-timeout: 1000
        group: DEFAULT_GROUP
  config:
    import:
      - nacos:${spring.application.name}-dev?group=DEFAULT_GROUP&refresh=true
    sentinel:
      transport:
        dashboard:
        port: 8719
        clientIp:
      enabled: true
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                          allowed-origins:
                            -  "http://localhost:3000"
                          allowed-methods:
                            - "GET"
                            - "POST"
                            - "DELETE"
                            - "PUT"
                            - "OPTION"
                          allowed-headers:
                            - "*"
                          allow-credentials: true
                          max-age: 360000
